<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartEVSE Raw Settings</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --key: #93c5fd;
      --string: #86efac;
      --number: #c4b5fd;
      --bool: #fcd34d;
      --null: #fda4af;
      --btn: #2563eb;
      --btn-hover: #1d4ed8;
      --btn-secondary: #374151;
      --btn-secondary-hover: #1f2937;
    }
    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 12px 0;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button, .link-btn {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .primary {
      background: var(--btn);
    }
    .primary:hover {
      background: var(--btn-hover);
    }
    .secondary {
      background: var(--btn-secondary);
    }
    .secondary:hover {
      background: var(--btn-secondary-hover);
    }
    #status {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    pre {
      margin: 0;
      overflow: auto;
      background: #0f172a;
      color: #e5e7eb;
      padding: 16px;
      border-radius: 10px;
      line-height: 1.45;
      font-size: 0.9rem;
      max-height: calc(100vh - 220px);
    }
    .key { color: var(--key); }
    .string { color: var(--string); }
    .number { color: var(--number); }
    .boolean { color: var(--bool); }
    .null { color: var(--null); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Raw Settings</h1>
      <div class="toolbar">
        <a class="link-btn secondary" href="/">Back</a>
        <button id="refreshBtn" class="secondary" type="button">Refresh</button>
        <button id="downloadBtn" class="primary" type="button" disabled>Download JSON</button>
      </div>
      <div id="status">Loading settings...</div>
      <pre id="jsonView" aria-live="polite"></pre>
    </div>
  </div>

  <script>
    let latestRawJson = "";

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function syntaxHighlight(jsonText) {
      return jsonText.replace(
        /("(?:\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\btrue\b|\bfalse\b|\bnull\b|-?\b\d+(?:\.\d+)?(?:[eE][+\-]?\d+)?\b)/g,
        function (match) {
          let cls = "number";
          if (match[0] === "\"") {
            cls = match.endsWith(":") ? "key" : "string";
          } else if (match === "true" || match === "false") {
            cls = "boolean";
          } else if (match === "null") {
            cls = "null";
          }
          return "<span class=\"" + cls + "\">" + match + "</span>";
        }
      );
    }

    function updateStatus(message) {
      document.getElementById("status").textContent = message;
    }

    async function loadSettings() {
      const jsonView = document.getElementById("jsonView");
      const downloadBtn = document.getElementById("downloadBtn");
      updateStatus("Loading settings...");
      downloadBtn.disabled = true;
      jsonView.textContent = "";

      try {
        const response = await fetch("/settings", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        latestRawJson = await response.text();
        let prettyJson;
        try {
          prettyJson = JSON.stringify(JSON.parse(latestRawJson), null, 2);
        } catch (parseError) {
          prettyJson = latestRawJson;
        }

        jsonView.innerHTML = syntaxHighlight(escapeHtml(prettyJson));
        downloadBtn.disabled = false;
        updateStatus("Loaded successfully.");
      } catch (error) {
        latestRawJson = "";
        jsonView.textContent = "Failed to load /settings.";
        updateStatus("Error: " + error.message);
      }
    }

    function downloadSettings() {
      if (!latestRawJson) return;
      const now = new Date();
      const pad = function (n) { return String(n).padStart(2, "0"); };
      const timestamp = now.getFullYear() +
        pad(now.getMonth() + 1) +
        pad(now.getDate()) + "-" +
        pad(now.getHours()) +
        pad(now.getMinutes()) +
        pad(now.getSeconds());

      const blob = new Blob([latestRawJson], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "settings-" + timestamp + ".json";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    document.getElementById("refreshBtn").addEventListener("click", loadSettings);
    document.getElementById("downloadBtn").addEventListener("click", downloadSettings);
    loadSettings();
  </script>
</body>
</html>
